name: Reusable workflow for IaC implementation

on:
  workflow_call:
    inputs:
      environment:
        description: 'The environment to deploy to'
        required: true
        type: string

jobs:
  deploy-iac:
    name: Deploy IaC
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    runs-on:
      group: 'scidomum-int-${{ inputs.environment }}'
      labels: 'scidomum-${{ inputs.environment }}-ubuntu-amd64'
    env:
      TF_VAR_ENVIRONMENT: ${{ inputs.environment }}
      TF_VAR_ROOT_RG_LOCATION: ${{ vars.AZURE_ROOT_LOCATION }}
      TF_VAR_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      TF_VAR_AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      TF_VAR_AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
    steps:
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.6

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          sparse-checkout: |
            iac
          sparse-checkout-cone-mode: false
          
      - name: Azure federated login
        uses: azure/login@v3
        with:
          creds: >-
            {"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}
          allow-no-subscriptions: true
          
      - name: Terraform Init
        run: |
          terraform init -input=false  \
          -backend-config="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
          -backend-config="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
          -backend-config="client_secret=${{ secrets.AZURE_CLIENT_SECRET }}" \
          -backend-config="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
          -backend-config="resource_group_name=${{ secrets.AZURE_RESOURCE_GROUP_NAME }}" \
          -backend-config="storage_account_name=${{ secrets.TFSTATE_STORAGE_ACCOUNT_NAME }}" \
          -backend-config="container_name=${{ secrets.TFSTATE_CONTAINER_NAME }}" \
          -backend-config="key=Aetherforge-Containerum-DEV.tfstate"

      - name: Validate and debug Terraform of Infrastructure
        run: |
          terraform fmt -recursive
          terraform validate
          terraform plan -input=false -out=tfplan

      - name: Apply Terraform of Infrastructure
        run: |
          terraform apply -input=false -auto-approve tfplan