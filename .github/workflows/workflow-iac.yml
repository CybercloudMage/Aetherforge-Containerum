name: Reusable workflow for IaC implementation

on:
  workflow_call:
    inputs:
      environment:
        description: 'The environment to deploy to'
        required: true
        type: string

jobs:
  deploy-iac:
    name: Deploy IaC
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    runs-on:
      group: 'scidomum-int-${{ inputs.environment }}'
      labels: 'scidomum-${{ inputs.environment }}-ubuntu-amd64'
    env:
      TF_VAR_ENVIRONMENT: ${{ inputs.environment }}
      TF_VAR_ROOT_RG_LOCATION: ${{ vars.AZURE_ROOT_LOCATION }}
      TF_VAR_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
    steps:
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.6

      - name: Condition values and variables for use
        id: condition_values
        run: |
          repository_name_lower="$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')"
          echo "repository_name_lower=$repository_name_lower" >> "$GITHUB_OUTPUT"
          echo "Repository name: $repository_name_lower"

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          sparse-checkout: |
            iac
          sparse-checkout-cone-mode: false

      - name: Move IaC contents to workspace root
        run: |
          cp -a iac/. ./
          rm -rf iac
          
      - name: Azure federated login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: true

      - name: Validate access to backend storage account
        run: |
          echo "Validating read access to target backend container..."
          az storage blob list \
            --subscription "${{ secrets.TFSTATE_SUBSCRIPTION_ID }}" \
            --account-name "${{ secrets.TFSTATE_STORAGE_ACCOUNT_NAME }}" \
            --container-name "${{ steps.condition_values.outputs.repository_name_lower }}" \
            --num-results 1 \
            --auth-mode login \
            --only-show-errors >/dev/null

          echo "Validating credentials are not scoped broader than the target container..."
          if az storage container list \
            --subscription "${{ secrets.TFSTATE_SUBSCRIPTION_ID }}" \
            --account-name "${{ secrets.TFSTATE_STORAGE_ACCOUNT_NAME }}" \
            --auth-mode login \
            --only-show-errors >/dev/null 2>&1; then
            echo "Unexpected permission: credentials can list containers at account scope."
            exit 1
          fi

          echo "Access validation passed: readable target container with no account-level container listing."

      - name: Confirm add/delete in backend container
        run: |
          test_blob="workflow-access-check-${{ github.run_id }}-${{ github.run_attempt }}.txt"
          echo "ok" > "$test_blob"
          az storage blob upload \
            --subscription "${{ secrets.TFSTATE_SUBSCRIPTION_ID }}" \
            --account-name "${{ secrets.TFSTATE_STORAGE_ACCOUNT_NAME }}" \
            --container-name "${{ steps.condition_values.outputs.repository_name_lower }}" \
            --name "$test_blob" \
            --file "$test_blob" \
            --overwrite true \
            --auth-mode login
          az storage blob delete \
            --subscription "${{ secrets.TFSTATE_SUBSCRIPTION_ID }}" \
            --account-name "${{ secrets.TFSTATE_STORAGE_ACCOUNT_NAME }}" \
            --container-name "${{ steps.condition_values.outputs.repository_name_lower }}" \
            --name "$test_blob" \
            --auth-mode login
          rm -f "$test_blob"
          

      - name: Terraform Init
        run: |
          terraform init -input=false  \
          -backend-config="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
          -backend-config="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
          -backend-config="subscription_id=${{ secrets.TFSTATE_SUBSCRIPTION_ID }}" \
          -backend-config="resource_group_name=${{ secrets.TFSTATE_RESOURCE_GROUP_NAME }}" \
          -backend-config="storage_account_name=${{ secrets.TFSTATE_STORAGE_ACCOUNT_NAME }}" \
          -backend-config="container_name=${{ steps.condition_values.outputs.repository_name_lower }}" \
          -backend-config="key=${{ github.event.repository.name }}-${{ inputs.environment }}.tfstate"

      - name: Validate and debug Terraform of Infrastructure
        run: |
          terraform fmt -recursive
          terraform validate
          terraform plan -input=false -out=tfplan

      - name: Apply Terraform of Infrastructure
        run: |
          terraform apply -input=false -auto-approve tfplan