name: Reusable workflow for IaC implementation

on:
  workflow_call:
    inputs:
      environment:
        description: 'The environment to deploy to'
        required: true
        type: string

jobs:
  deploy-iac:
    name: Deploy IaC
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    runs-on:
      group: 'scidomum-int-${{ inputs.environment }}'
      labels: 'scidomum-${{ inputs.environment }}-ubuntu-amd64'
    env:
      TF_LOG: trace
      TF_VAR_ENVIRONMENT: ${{ inputs.environment }}
      TF_VAR_ROOT_RG_LOCATION: ${{ vars.AZURE_ROOT_LOCATION }}
      TF_VAR_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
    steps:
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.6

      - name: Condition values and variables for use
        id: condition_values
        run: |
          repository_name_lower="$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')"
          echo "repository_name_lower=$repository_name_lower" >> "$GITHUB_OUTPUT"
          echo "Repository name: $repository_name_lower"

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          sparse-checkout: |
            iac
          sparse-checkout-cone-mode: false
          path: ./

      - name: Show the root of the runner work area
        run: |
          echo "Root of the runner work area:"
          ls -alh
          echo "Current directory:"
          pwd

      - name: Azure federated login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: true

      - name: Validate backend configuration inputs
        run: |
          if [ -z "${{ secrets.TFSTATE_SUBSCRIPTION_ID }}" ] || [ -z "${{ secrets.TFSTATE_RESOURCE_GROUP_NAME }}" ] || [ -z "${{ secrets.TFSTATE_STORAGE_ACCOUNT_NAME }}" ] || [ -z "${{ secrets.AZURE_TENANT_ID }}" ] || [ -z "${{ secrets.AZURE_CLIENT_ID }}" ]; then
            echo "Missing one or more required TFSTATE_* backend secrets."
            exit 1
          fi

          if [ "${{ secrets.TFSTATE_SUBSCRIPTION_ID }}" = "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]; then
            echo "TFSTATE_SUBSCRIPTION_ID must be different from AZURE_SUBSCRIPTION_ID."
            exit 1
          fi

      - name: Terraform Init
        run: |
          terraform init -input=false  \
          -backend-config="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
          -backend-config="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
          -backend-config="subscription_id=${{ secrets.TFSTATE_SUBSCRIPTION_ID }}" \
          -backend-config="resource_group_name=${{ secrets.TFSTATE_RESOURCE_GROUP_NAME }}" \
          -backend-config="storage_account_name=${{ secrets.TFSTATE_STORAGE_ACCOUNT_NAME }}" \
          -backend-config="container_name=${{ steps.condition_values.outputs.repository_name_lower }}" \
          -backend-config="key=${{ github.event.repository.name }}-${{ inputs.environment }}.tfstate"

      - name: Validate and debug Terraform of Infrastructure
        run: |
          terraform fmt -recursive
          terraform validate
          terraform plan -input=false -out=tfplan

      - name: Apply Terraform of Infrastructure
        run: |
          terraform apply -input=false -auto-approve tfplan