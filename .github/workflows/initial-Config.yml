name: Initialize and configure the Aetherforge-Containerum Terraform state storage

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Select the deployment environment
        required: true
        type: choice
        options:
          - poc
          - dev
          - test
          - prod
  
jobs:
  initialize-config:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Authenticate to the Azure environment using Client ID and Client Secret
        uses: azure/login@v3
        with:
          creds: >-
            {"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}

      - name: Set up Azure PowerShell on Runner
        id: create-state-store
        uses: azure/powershell@v3
        with:
          azPSVersion: 'latest'
          inlineScript: ./Create-StateStore.ps1 -TenantId ${{ secrets.AZURE_TENANT_ID }} -SubscriptionId ${{ secrets.AZURE_SUBSCRIPTION_ID }} -ResourceGroupName ${{ secrets.AZURE_RESOURCE_GROUP_NAME }};

      - name: GitHub App login for further actions
        id: ghe-varsmgmt-login
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.GHE_VARSMGMT_CLIENT_ID }}
          private-key: ${{ secrets.GHE_VARSMGMT_APP_PEM }}

      - name: Write repository secret
        env:
          GH_TOKEN: ${{ steps.ghe-varsmgmt-login.outputs.token }}
        run: |
          gh secret set TF_STATE_STORAGE_ACCOUNT_NAME --env "${{ github.event.inputs.environment }}" --body "${{ steps.create-state-store.outputs.storage_account_name }}"
          gh secret set TF_STATE_STORAGE_ACCOUNT_ID --env "${{ github.event.inputs.environment }}" --body "${{ steps.create-state-store.outputs.storage_account_id }}"