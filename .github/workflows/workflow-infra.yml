name: Reusable workflow for Infrastructure deployment
on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        required: false
        default: dev
        type: string
  workflow_dispatch:
    inputs:
      ENVIRONMENT:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - poc
          - dev
          - test
          - prod

jobs:
  deploy-infra:
    name: Deploy Infrastructure
    runs-on:
      group: scidomum-int-dev
      labels: scidomum-${{ inputs.ENVIRONMENT }}-ubuntu-amd64
    permissions:
      contents: read
      id-token: write
    env:
      TF_VAR_ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
      TF_VAR_AZURE_ROOT_REGION_NAME: ${{ vars.AZURE_ROOT_REGION_NAME }}
    steps:
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.6
      
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          sparse-checkout: |
            iac
          sparse-checkout-cone-mode: false
          path: ./

      - name: Azure login for Terraform deployment
        uses: azure/login@v1
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: |
          terraform init -input=false \
          -backend-config="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
          -backend-config="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
          -backend-config="subscription_id=${{ secrets.TFSTATE_BACKEND_SUBSCRIPTION_ID }}" \
          -backend-config="resource_group_name=${{ secrets.TFSTATE_BACKEND_RESOURCE_GROUP_NAME }}" \
          -backend-config="storage_account_name=${{ secrets.TFSTATE_BACKEND_STORAGE_ACCOUNT_NAME }}" \
          -backend-config="container_name=${GITHUB_REPOSITORY_OWNER,,}" \
          -backend-config="key=${{ github.event.repository.name }}-${{ inputs.ENVIRONMENT }}.tfstate"
      
      - name: Terraform Validate and Plan
        run: |
          terraform fmt -recursive
          terraform validate
          terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        run: |
          terraform apply -input=false -auto-approve tfplan